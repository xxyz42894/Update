            const [isVisible, setIsVisible] = useState(true);
            
            useEffect(() => {
                const timer = setTimeout(() => {
                    setIsVisible(false);
                    setTimeout(onClose, 300);
                }, 3000);
                return () => clearTimeout(timer);

            const getStyles = () => {
                switch(type) {
                    case 'warning': return 'bg-amber-50 dark:bg-amber-900/30 border-amber-200 dark:border-amber-800 text-amber-800 dark:text-amber-300';
                    case 'error': return 'bg-red-50 dark:bg-red-900/30 border-red-200 dark:border-red-800 text-red-800 dark:text-red-300';
                    case 'success': return 'bg-green-50 dark:bg-green-900/30 border-green-200 dark:border-green-800 text-green-800 dark:text-green-300';
                    default: return 'bg-blue-50 dark:bg-blue-900/30 border-blue-200 dark:border-blue-800 text-blue-800 dark:text-blue-300';

            };

                switch(type) {
                    case 'warning': return 'alert-circle';
                    case 'error': return 'x-circle';

                const handleClickOutside = (e) => {

                return () => document.removeEventListener('mousedown', handleClickOutside);

                        setAllReleases(list);

                            setSelectedVersion(list[0].tag_name);

                let start = 0; const duration = 1000; const stepTime = 20; const steps = duration / stepTime; const increment = total / steps; let currentStep = 0;

                setActiveMirrorVariant(variantId);

                    setMirrorTimer(prev => {

                            clearInterval(timerIntervalRef.current);
                            timerIntervalRef.current = null;
                            
                            setMirrorTimer(0);
                            
                            setTimeout(() => {
                                window.open(MIRROR_URL, '_blank');
                                setActiveMirrorVariant(null);
                                setMirrorTimer(null);
                            }, 500);
                            
                            return 0;
                        }
                        return prev - 1;
                    });
                }, 1000);
            };

            // DOWNLOAD FUNCTION - 15s total with 3 steps (5s each), live countdown, and blinking
            const handleDownload = (asset, variant) => {
                const version = release?.tag_name || 'v1.0.0';
                const filename = `${APP_NAME}-${version}-${variant.id}.apk`;
                const downloadUrl = asset.browser_download_url;
                
                // Clear any existing timers
                if (downloadTimerRef.current) clearTimeout(downloadTimerRef.current);
                if (stepTimer1Ref.current) clearTimeout(stepTimer1Ref.current);
                if (stepTimer2Ref.current) clearTimeout(stepTimer2Ref.current);
                if (stepTimer3Ref.current) clearTimeout(stepTimer3Ref.current);
                if (countdownIntervalRef.current) clearInterval(countdownIntervalRef.current);
                
                // Reset countdown
                setCountdown(15);
                
                // Show download panel with step 0 (Prepare) - Step 1 blinking
                setDownloadState({ show: true, filename, downloadStep: 0, variant });
                
                // Start live countdown
                countdownIntervalRef.current = setInterval(() => {
                    setCountdown(prev => {
                        if (prev <= 1) {
                            clearInterval(countdownIntervalRef.current);
                            countdownIntervalRef.current = null;
                            return 0;
                        }
                        return prev - 1;
                    });
                }, 1000);
                
                // Step 0 -> Step 1 after 5 seconds
                stepTimer1Ref.current = setTimeout(() => {
                    setDownloadState(prev => ({ ...prev, downloadStep: 1 }));
                    
                    // Step 1 -> Step 2 after another 5 seconds
                    stepTimer2Ref.current = setTimeout(() => {
                        setDownloadState(prev => ({ ...prev, downloadStep: 2 }));
                        
                        // Step 2 -> Download start after another 5 seconds
                        stepTimer3Ref.current = setTimeout(() => {
                            setDownloadState(prev => ({ ...prev, downloadStep: 3 }));

                    link.target = '_blank';

                    if (stepTimer3Ref.current) clearTimeout(stepTimer3Ref.current);

                                <h1 className="text-3xl md:text-4xl font-bold tracking-tight flex flex-col">
                                    <span>PadhaiSetu</span>
                                    <span>Class 10th NCERT books App</span>
                                </h1>
                                <p className="text-slate-500 dark:text-slate-400 font-medium">{release?.tag_name || 'v1.0.1'} Build • {totalDownloads.toLocaleString()} Total Downloads</p>
                                
                                <div className="flex flex-wrap items-center justify-center gap-3">
                                    <button onClick={() => setShowScreenshots(true)} className="px-4 py-2 bg-slate-100 dark:bg-slate-800 rounded-lg text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-700 transition-all flex items-center gap-2">
                                        <Icon name="eye" size={16} /> App Preview
                                    </button>
                                    
                                    <button onClick={() => setShowWhatsNew(true)} className="hidden sm:flex items-center gap-2 px-4 py-2 bg-slate-100 dark:bg-slate-800 rounded-lg text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-700 transition-all">
                                        <span className="text-base">✨</span> What's New
                                    </button>
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto px-6 pb-20">
                        {error ? (
                            <div className="bg-red-50 dark:bg-red-900/10 border border-red-200 rounded-xl p-8 text-center max-w-2xl mx-auto">
                                <Icon name="alert-circle" size={48} className="text-red-500 mx-auto mb-4" />
                                <h3 className="text-xl font-bold mb-2">Connection Issue</h3>
                                <p className="mb-4">Network issue. Try again.</p>
                                <button onClick={() => window.location.reload()} className="px-6 py-2 bg-red-600 text-white rounded-lg">Retry</button>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                                <div className="lg:col-span-8">
                                    <SectionTitle iconName="download">SELECT YOUR VARIANT</SectionTitle>
                                    <p className="text-slate-500 text-sm text-center mb-8">PadhaiSetu provides <span className="font-semibold">Class 10 NCERT</span> and <span className="font-semibold">BSEB textbooks</span>.</p>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        {matchedVariants.map((variant) => (
                                            <div key={variant.id} className={`group relative bg-white dark:bg-[#0a0a0a] border ${variant.id === 'universal' ? 'border-blue-200 dark:border-blue-900/50' : 'border-slate-200 dark:border-slate-800'} rounded-xl p-6 flex flex-col justify-between hover:shadow-xl hover:scale-[1.02] transition-all`}>
                                                {variant.id === 'universal' && <div className="absolute top-0 right-0 bg-blue-600 text-white text-[10px] font-bold px-3 py-1 rounded-bl-lg uppercase animate-blink">Recommended</div>}
                                                <div>
                                                    <div className="flex justify-between items-start mb-4">
                                                        <span className={`px-3 py-1 rounded-full text-xs font-bold ${variant.id === 'universal' ? 'bg-blue-50 dark:bg-blue-900/30 text-blue-700' : 'bg-slate-100 dark:bg-slate-800'}`}>{variant.title}</span>
                                                        {variant.id !== 'universal' && <span className="text-slate-400 text-sm">{variant.label}</span>}
                                                    </div>
                                                    <h3 className="text-xl font-bold mb-2 flex items-center gap-2">
                                                        <span className="whitespace-nowrap">{release?.tag_name || 'v1.0.1'}-{variant.id}</span>
                                                        {release?.prerelease && (
                                                            <span className="px-2 py-0.5 rounded-full border border-[#9b6400] text-[#9b6400] text-[10px] whitespace-nowrap">
                                                                Pre-release
                                                            </span>
                                                        )}
                                                    </h3>
                                                    <p className="text-slate-500 text-sm mb-6">{variant.description}</p>
                                                    <div className="space-y-2 mb-8 text-sm">
                                                        <div className="flex justify-between"><span className="text-slate-400">Size:</span><span className="font-mono">{variant.asset ? formatSize(variant.asset.size) : '---'}</span></div>
                                                        <div className="flex justify-between"><span className="text-slate-400">Arch:</span><span className="font-mono uppercase">{variant.id}</span></div>
                                                        <div className="flex justify-between border-t pt-2"><span className="text-slate-400">Support:</span><span className="text-green-600">Android {variant.minAndroid}</span></div>
                                                    </div>
                                                </div>
                                                {variant.asset ? (
                                                    <div className="space-y-2">
                                                        <button onClick={() => handleDownload(variant.asset, variant)} className={`w-full py-3 rounded-lg ${variant.color} text-white font-bold active:scale-95 hover:brightness-110 flex items-center justify-center gap-2`}>
                                                            <Icon name="download" size={18} /> Download APK
                                                        </button>
                                                        <MirrorButton 
                                                            isTimerRunning={activeMirrorVariant === variant.id}
                                                            timerCount={mirrorTimer}
                                                            onTimerStart={() => startMirrorTimer(variant.id)}
                                                        />
                                                    </div>
                                                ) : <div className="w-full py-3 rounded-lg bg-slate-50 dark:bg-slate-800/50 text-slate-400 text-center border">Not in release</div>}
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="lg:col-span-4 space-y-5">
                                    <SectionTitle iconName="info">Release Info</SectionTitle>
                                    
                                    {allReleases.length > 0 && (
                                        <div className="bg-white dark:bg-[#0a0a0a] border border-slate-200 dark:border-slate-800 rounded-xl overflow-hidden">
                                            <div className="p-5 border-b border-slate-100 dark:border-slate-800">
                                                <div className="flex items-center gap-2"><Icon name="tag" size={16} className="text-blue-600" /><h4 className="text-xs font-bold text-slate-500 uppercase">Version History</h4></div>
                                            </div>
                                            <div className="p-5">
                                                <CustomDropdown options={dropdownOptions} value={selectedVersion} onChange={handleVersionChange} />
                                                {selectedReleaseInfo && (
                                                    <div className="mt-5 text-center">
                                                        <p className="text-2xl font-bold text-slate-800 dark:text-slate-100">{selectedReleaseInfo.tag_name}</p>
                                                        <p className="text-sm text-slate-500 dark:text-slate-400 mt-0.5">{new Date(selectedReleaseInfo.published_at).toLocaleDateString()}</p>
                                                        {selectedReleaseInfo.prerelease && <span className="inline-block mt-2 px-3 py-0.5 bg-amber-100 dark:bg-amber-900/30 text-amber-700 dark:text-amber-400 text-[10px] font-bold rounded-full uppercase">Pre-release</span>}
                                                    </div>
                                                )}
                                                <div className="mt-5 pt-4 border-t border-slate-100 dark:border-slate-800 flex items-center justify-between">
                                                    <span className="text-xs text-slate-500">{allReleases.length} versions available</span>
                                                    <span className="text-xs text-blue-600 font-medium">Currently: {release?.tag_name}</span>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                    
                                    <div className="bg-white dark:bg-[#0a0a0a] border border-slate-200 dark:border-slate-800 rounded-xl p-5">
                                        <h4 className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4">Release Notes</h4>
                                        <div className="text-slate-600 dark:text-slate-400 max-h-[180px] overflow-y-auto pr-3 custom-scrollbar text-sm">{release?.body || "Official app build."}</div>
                                    </div>
                                    
                                    <div className="bg-white dark:bg-[#0a0a0a] border border-slate-200 dark:border-slate-800 rounded-xl p-5 shadow-sm">
                                        <h4 className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4">Integrity Checks</h4>
                                        <div className="space-y-3">
                                            <p className="text-[10px] font-bold uppercase flex items-center gap-1">
                                                <Icon name="shield-check" size={12} className="text-blue-600" /> SHA-256
                                            </p>
                                            <p className="font-mono text-[10px] text-slate-500 break-all bg-slate-50 dark:bg-slate-800 p-2.5 rounded-lg uppercase border border-slate-200 dark:border-slate-700">
                                                {SHA_HASH}
                                            </p>
                                            <button 
                                                onClick={copyHash} 
                                                className={`w-full py-2.5 text-sm font-medium rounded-lg transition-all flex items-center justify-center gap-2 ${
                                                    copySuccess 
                                                        ? 'bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-300' 
                                                        : 'bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700'
                                                }`}
                                            >
                                                {copySuccess ? (
                                                    <>
                                                        <Icon name="check" size={16} className="text-green-600" />
                                                        <span>Copied!</span>
                                                    </>
                                                ) : (
                                                    <>
                                                        <Icon name="copy" size={16} />
                                                        <span>Copy SHA-256</span>
                                                    </>
                                                )}
                                            </button>
                                            <p className="text-[10px] text-slate-400 text-center">Verify APK integrity before installing</p>
                                        </div>
                                    </div>
                                    
                                    <div className="bg-white dark:bg-[#0a0a0a] border border-slate-200 dark:border-slate-800 rounded-xl p-5">
                                        <h4 className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4">FAQ</h4>
                                        <div className="space-y-3">
                                            <details className="group"><summary className="text-sm font-medium flex justify-between">How to install? <Icon name="chevron-right" size={14} className="group-open:rotate-90" /></summary><p className="text-xs text-slate-500 mt-2">Download APK, open file manager, tap to install.</p></details>
                                            <details className="group"><summary className="text-sm font-medium flex justify-between">Which variant? <Icon name="chevron-right" size={14} className="group-open:rotate-90" /></summary><p className="text-xs text-slate-500 mt-2">Universal for all. ARM64 for new, ARM32 for old.</p></details>
                                            <details className="group"><summary className="text-sm font-medium flex justify-between">Download wait? <Icon name="chevron-right" size={14} className="group-open:rotate-90" /></summary><p className="text-xs text-slate-500 mt-2">15 seconds total - 5 seconds per step for security.</p></details>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-black pt-8 pb-12 text-center">
                        <div className="max-w-6xl mx-auto px-6 space-y-6">
                            <p className="text-slate-600 dark:text-slate-400 text-sm">Developed with ❤️ by PadhaiSetu</p>
                            <div className="flex items-center justify-center gap-4">
                                <a href="https://instagram.com/suraj.kr_98" target="_blank" className="w-10 h-10 bg-slate-100 dark:bg-slate-800 rounded-xl flex items-center justify-center hover:text-pink-600 hover:scale-110"><Icon name="instagram" size={18} /></a>
                                <a href="https://t.me/Inspire_suraj" target="_blank" className="w-10 h-10 bg-slate-100 dark:bg-slate-800 rounded-xl flex items-center justify-center hover:text-blue-500 hover:scale-110"><Icon name="telegram" size={18} /></a>
                                <a href="https://github.com/xxyz42894/Update" target="_blank" className="w-10 h-10 bg-slate-100 dark:bg-slate-800 rounded-xl flex items-center justify-center hover:text-purple-600 hover:scale-110"><Icon name="github" size={18} /></a>
                            </div>
                            <p className="text-slate-400 text-sm font-bold tracking-widest">@2026</p>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
