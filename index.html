<body class="selection:bg-blue-100 dark:selection:bg-blue-900 transition-all duration-700 ease-in-out scroll-smooth">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, memo, useRef } = React;

        const GITHUB_REPO = 'xxyz42894/Update';
        const SHA_HASH = "1c30a19bfd1071494cb6fcb1a24ee45d49524429fa4f90d045b12c92ef1b4f00";

        // Point 1: React.memo for performance
        const Icon = memo(({ name, size = 20, className = "" }) => {
            const icons = {
                smartphone: () => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12" y2="18"/></svg>),
                zap: () => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>),
                globe: () => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>),
                sun: () => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>),
                moon: () => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>),
                'external-link': () => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>),
                download: () => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>),
                info: () => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>),
                'shield-check': () => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/></svg>),
                'chevron-right': () => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="9 18 15 12 9 6"/></svg>),
                'chevron-left': () => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="15 18 9 12 15 6"/></svg>),
                send: () => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>),
                share: () => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>),
                x: () => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>),
                'alert-circle': () => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>),
                instagram: () => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>),
                telegram: () => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21.5 4.5L2.5 11.5L9.5 14.5L12.5 21.5L21.5 4.5Z"/><line x1="9.5" y1="14.5" x2="14.5" y2="9.5"/></svg>),
                github: () => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/><path d="M9 18c-4.51 2-5-2-7-2"/></svg>),
                'image': () => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>),
            };
            return icons[name] ? icons[name]() : <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}><circle cx="12" cy="12" r="10"/></svg>;
        });

        const VARIANTS = [
            { id: 'arm64', title: 'ARM64-v8a', label: 'Best for Performance', description: 'High-speed capability for modern 64-bit devices. Optimized memory handling.', icon: 'zap', matchPatterns: ['arm64', 'v8a', '64'], color: 'bg-slate-900 dark:bg-slate-800', minAndroid: '9+' },
            { id: 'arm32', title: 'ARMeabi-v7a', label: 'Max Compatibility', description: 'Recommended for older Android versions and 32-bit hardware. Stable & efficient.', icon: 'smartphone', matchPatterns: ['v7a', '32', 'armv7'], color: 'bg-slate-900 dark:bg-slate-800', minAndroid: '7+' },
            { id: 'universal', title: 'Universal APK', label: 'Recommended', description: 'Works on all devices. Recommended if you are unsure which variant to download.', icon: 'globe', matchPatterns: ['universal', 'all'], color: 'bg-slate-900 dark:bg-slate-800', minAndroid: '7+' }
        ];

        const SCREENSHOTS = [
            { id: 1, title: 'NCERT Books', desc: 'All Class 10 NCERT textbooks', color: 'from-blue-500 to-cyan-500' },
            { id: 2, title: 'BSEB Books', desc: 'Bihar Board complete syllabus', color: 'from-purple-500 to-pink-500' },
            { id: 3, title: 'Offline Reading', desc: 'Download once, read anywhere', color: 'from-green-500 to-emerald-500' }
        ];

        const Badge = ({ children, variant = 'primary' }) => (
            <span className={`px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wider ${variant === 'primary' ? 'bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-300' : 'bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400'}`}>{children}</span>
        );

        const SectionTitle = ({ children, iconName }) => (
            <h2 className="flex items-center justify-center gap-2 text-xl font-bold tracking-tight text-slate-800 dark:text-slate-100 mb-6 uppercase">
                <Icon name={iconName} size={20} className="text-blue-600 dark:text-blue-400" />
                {children}
            </h2>
        );

        // Toast notification helper
        const showToast = (message, type = 'success') => {
            if (typeof Toastify === 'undefined') return;
            Toastify({
                text: message,
                duration: 3000,
                gravity: "bottom",
                position: "center",
                style: { background: type === 'success' ? '#10b981' : '#3b82f6', borderRadius: '12px' }
            }).showToast();
        };

        function App() {
            const [release, setRelease] = useState(null);
            const [allReleases, setAllReleases] = useState([]);
            const [selectedVersion, setSelectedVersion] = useState('latest');
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [copySuccess, setCopySuccess] = useState(false);
            const [displayCount, setDisplayCount] = useState(0);
            const [showWhatsNew, setShowWhatsNew] = useState(false);
            const [showQR, setShowQR] = useState(false);
            const [currentQRUrl, setCurrentQRUrl] = useState('');
            const [showScreenshots, setShowScreenshots] = useState(false);
            const [currentScreenshot, setCurrentScreenshot] = useState(0);
            const [downloadProgress, setDownloadProgress] = useState(null);
            const [darkMode, setDarkMode] = useState(() => {
                return localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches);
            });

            // Point 8: Auto dark mode sync with system
            useEffect(() => {
                const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
                const handler = (e) => !localStorage.getItem('theme') && setDarkMode(e.matches);
                mediaQuery.addEventListener('change', handler);
                return () => mediaQuery.removeEventListener('change', handler);
            }, []);

            useEffect(() => {
                if (darkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', darkMode ? 'dark' : 'light');
            }, [darkMode]);

            useEffect(() => {
                async function fetchData() {
                    try {
                        const listRes = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/releases`);
                        const list = await listRes.json();
                        setAllReleases(list);
                        
                        const relRes = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/releases/latest`);
                        if (!relRes.ok) {
                            setRelease(list[0]);
                        } else {
                            const data = await relRes.json();
                            setRelease(data);
                        }
                        
                        // Point 10: New release notification
                        const lastSeen = localStorage.getItem('lastSeenVersion');
                        if (lastSeen && list[0] && lastSeen !== list[0].tag_name) {
                            showToast(`🎉 New version ${list[0].tag_name} available!`, 'info');
                        }
                        if (list[0]) localStorage.setItem('lastSeenVersion', list[0].tag_name);
                        
                    } catch (err) {
                        setError(err.message);
                        setRelease({ tag_name: "v1.0.0", assets: [], published_at: new Date().toISOString(), body: "Official app build for NCERT education." });
                    } finally {
                        setLoading(false);
                    }
                }
                fetchData();

                // Point 6: Show What's New on first visit
                if (!localStorage.getItem('seenWhatsNew')) {
                    setShowWhatsNew(true);
                    localStorage.setItem('seenWhatsNew', 'true');
                }
            }, []);

            // Point 3: Animated download count
            useEffect(() => {
                if (!release) return;
                const total = release.assets?.reduce((acc, curr) => acc + (curr.download_count || 0), 0) || 0;
                let start = 0;
                const step = Math.ceil(total / 40);
                const timer = setInterval(() => {
                    start += step;
                    if (start >= total) { setDisplayCount(total); clearInterval(timer); }
                    else setDisplayCount(start);
                }, 25);
                return () => clearInterval(timer);
            }, [release]);

            // Point 2: Version change handler
            const handleVersionChange = (versionTag) => {
                setSelectedVersion(versionTag);
                const selected = allReleases.find(r => r.tag_name === versionTag);
                if (selected) setRelease(selected);
            };

            const formatSize = (bytes) => {
                if (!bytes) return '---';
                return `${(bytes / (1024 * 1024)).toFixed(1)} MB`;
            };

            const matchedVariants = release ? VARIANTS.map(v => ({
                ...v,
                asset: release.assets?.find(asset => v.matchPatterns.some(pattern => asset.name.toLowerCase().includes(pattern.toLowerCase())))
            })) : VARIANTS;

            const copyHash = () => {
                navigator.clipboard?.writeText(SHA_HASH);
                setCopySuccess(true);
                setTimeout(() => setCopySuccess(false), 2000);
                showToast('✓ Hash copied to clipboard!');
            };

            // Point 9: Share button
            const shareApp = async () => {
                if (navigator.share) {
                    await navigator.share({ title: 'PadhaiSetu APK', text: 'Download Class 10 NCERT & BSEB books app', url: window.location.href });
                } else {
                    navigator.clipboard?.writeText(window.location.href);
                    showToast('📋 Link copied to clipboard!');
                }
            };

            // Point 4: QR Code
            const generateQR = (url) => {
                setCurrentQRUrl(url);
                setShowQR(true);
            };

            // Point 7: Download with progress
            const downloadWithProgress = async (url, filename) => {
                try {
                    const response = await fetch(url);
                    const reader = response.body.getReader();
                    const contentLength = +response.headers.get('Content-Length');
                    let receivedLength = 0;
                    const chunks = [];
                    
                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        chunks.push(value);
                        receivedLength += value.length;
                        setDownloadProgress(Math.round((receivedLength / contentLength) * 100));
                    }
                    
                    const blob = new Blob(chunks);
                    const blobUrl = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = blobUrl;
                    a.download = filename;
                    a.click();
                    URL.revokeObjectURL(blobUrl);
                    setDownloadProgress(null);
                    showToast('✓ Download complete!');
                } catch (err) {
                    setDownloadProgress(null);
                    showToast('✗ Download failed', 'error');
                }
            };

            if (loading) {
                return (
                    <div className="min-h-screen bg-slate-50 dark:bg-black flex items-center justify-center">
                        <div className="text-center">
                            <div className="animate-spin w-12 h-12 border-4 border-slate-200 dark:border-slate-800 border-t-blue-600 rounded-full mx-auto"></div>
                            <p className="mt-4 text-sm text-slate-500 dark:text-slate-400">Loading...</p>
                        </div>
                    </div>
                );
            }

            const totalDownloads = displayCount || release?.assets?.reduce((acc, curr) => acc + (curr.download_count || 0), 0) || 0;

            return (
                <div className="min-h-screen bg-slate-50 dark:bg-black text-slate-900 dark:text-white transition-colors duration-700 overflow-x-hidden">
                    {/* Point 6: What's New Modal */}
                    {showWhatsNew && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay" onClick={() => setShowWhatsNew(false)}>
                            <div className="bg-white dark:bg-slate-900 rounded-2xl p-6 max-w-md w-full animate-slideIn shadow-2xl" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="text-xl font-bold">🎉 What's New</h3>
                                    <button onClick={() => setShowWhatsNew(false)}><Icon name="x" size={20} /></button>
                                </div>
                                <ul className="space-y-3 text-sm text-slate-600 dark:text-slate-400">
                                    <li className="flex gap-2"><span>✨</span> Version history dropdown</li>
                                    <li className="flex gap-2"><span>📱</span> QR code for easy mobile download</li>
                                    <li className="flex gap-2"><span>📊</span> Animated download counter</li>
                                    <li className="flex gap-2"><span>📸</span> App screenshots carousel</li>
                                    <li className="flex gap-2"><span>📤</span> Share button</li>
                                </ul>
                                <button onClick={() => setShowWhatsNew(false)} className="mt-6 w-full py-2 bg-blue-600 text-white rounded-lg font-medium">Got it!</button>
                            </div>
                        </div>
                    )}

                    {/* Point 4: QR Code Modal */}
                    {showQR && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay" onClick={() => setShowQR(false)}>
                            <div className="bg-white dark:bg-slate-900 rounded-2xl p-6 text-center" onClick={e => e.stopPropagation()}>
                                <h3 className="font-bold mb-4">Scan to Download</h3>
                                <img src={`https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(currentQRUrl)}`} alt="QR Code" className="mx-auto rounded-lg" />
                                <button onClick={() => setShowQR(false)} className="mt-4 px-4 py-2 bg-slate-200 dark:bg-slate-800 rounded-lg">Close</button>
                            </div>
                        </div>
                    )}

                    {/* Point 5: Screenshots Modal */}
                    {showScreenshots && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay" onClick={() => setShowScreenshots(false)}>
                            <div className="bg-white dark:bg-slate-900 rounded-2xl p-6 max-w-lg w-full" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="font-bold">App Screenshots</h3>
                                    <button onClick={() => setShowScreenshots(false)}><Icon name="x" size={20} /></button>
                                </div>
                                <div className="relative">
                                    <div className={`h-48 rounded-xl bg-gradient-to-br ${SCREENSHOTS[currentScreenshot].color} flex items-center justify-center text-white`}>
                                        <div className="text-center">
                                            <Icon name="image" size={48} className="mx-auto mb-2 opacity-80" />
                                            <p className="font-bold text-lg">{SCREENSHOTS[currentScreenshot].title}</p>
                                            <p className="text-sm opacity-90">{SCREENSHOTS[currentScreenshot].desc}</p>
                                        </div>
                                    </div>
                                    <div className="flex justify-between mt-4">
                                        <button onClick={() => setCurrentScreenshot(prev => prev === 0 ? SCREENSHOTS.length - 1 : prev - 1)} className="p-2 bg-slate-100 dark:bg-slate-800 rounded-full"><Icon name="chevron-left" size={20} /></button>
                                        <div className="flex gap-1">{SCREENSHOTS.map((_, i) => <div key={i} className={`w-2 h-2 rounded-full ${i === currentScreenshot ? 'bg-blue-600' : 'bg-slate-300'}`} />)}</div>
                                        <button onClick={() => setCurrentScreenshot(prev => prev === SCREENSHOTS.length - 1 ? 0 : prev + 1)} className="p-2 bg-slate-100 dark:bg-slate-800 rounded-full"><Icon name="chevron-right" size={20} /></button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Navigation */}
                    <nav className="border-b border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-black/80 backdrop-blur-md sticky top-0 z-40">
                        <div className="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white shadow-lg"><Icon name="smartphone" size={18} className="text-white" /></div>
                                <span className="font-bold text-lg tracking-tight">PadhaiSetu APK</span>
                            </div>
                            <div className="flex items-center gap-2 sm:gap-4">
                                <button onClick={shareApp} className="p-2 rounded-xl bg-slate-100 dark:bg-slate-900 text-slate-600 dark:text-slate-400 hover:text-blue-600 transition-all"><Icon name="share" size={18} /></button>
                                <button onClick={() => setDarkMode(!darkMode)} className="p-2 rounded-xl bg-slate-100 dark:bg-slate-900 text-slate-600 dark:text-slate-400 hover:text-blue-600 transition-all">{darkMode ? <Icon name="sun" size={18} /> : <Icon name="moon" size={18} />}</button>
                                <button onClick={() => document.getElementById('faq-section')?.scrollIntoView({ behavior: 'smooth' })} className="hidden sm:block text-sm font-semibold text-blue-600 dark:text-blue-400 hover:underline">Help & FAQ</button>
                            </div>
                        </div>
                    </nav>

                    {/* Download Progress Bar */}
                    {downloadProgress !== null && (
                        <div className="fixed top-16 left-0 right-0 z-30">
                            <div className="h-1 bg-blue-600 transition-all duration-300" style={{ width: `${downloadProgress}%` }} />
                            <div className="text-center text-xs py-1 bg-white/80 dark:bg-black/80">{downloadProgress}% Downloaded</div>
                        </div>
                    )}

                    {/* Hero Section */}
                    <header className="relative pt-12 pb-12 overflow-hidden">
                        <div className="absolute top-0 left-1/2 -translate-x-1/2 w-full h-full -z-10 pointer-events-none opacity-20 dark:opacity-10">
                            <div className="absolute top-[-10%] left-[-10%] w-[40%] h-[60%] bg-blue-400 blur-[120px] rounded-full" />
                            <div className="absolute bottom-[-10%] right-[-10%] w-[40%] h-[60%] bg-purple-400 blur-[120px] rounded-full" />
                        </div>
                        <div className="max-w-6xl mx-auto px-6 text-center">
                            <div className="flex flex-col items-center gap-4">
                                <div className="flex items-center gap-2">
                                    <Badge>Latest Release</Badge>
                                    {release?.prerelease && <span className="px-3 py-1 rounded-full border-2 border-[#9b6400] text-[#9b6400] text-[11px] font-bold">Pre-release</span>}
                                </div>
                                <h1 className="text-3xl md:text-4xl font-bold tracking-tight">PadhaiSetu Mobile App</h1>
                                <p className="text-slate-500 dark:text-slate-400 font-medium">
                                    {release?.tag_name || 'v1.0.0'} Build {release?.published_at ? new Date(release.published_at).toLocaleDateString() : 'N/A'} • {totalDownloads.toLocaleString()} Total Downloads
                                </p>
                                <div className="flex flex-wrap items-center justify-center gap-3">
                                    <button onClick={() => setShowScreenshots(true)} className="px-4 py-2 bg-slate-100 dark:bg-slate-800 rounded-lg text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-700 transition-all flex items-center gap-2">
                                        <Icon name="image" size={16} /> Screenshots
                                    </button>
                                    <button onClick={() => generateQR(window.location.href)} className="px-4 py-2 bg-slate-100 dark:bg-slate-800 rounded-lg text-sm font-medium hover:bg-slate-200 dark:hover:bg-slate-700 transition-all flex items-center gap-2">
                                        📱 QR Code
                                    </button>
                                </div>
                                <div className="flex flex-col items-center gap-1">
                                    <p className="text-[10px] text-slate-400 font-mono uppercase tracking-wider">ID: com.padhaisetu.class10ncertbooks</p>
                                    <a href={release?.html_url || '#'} target="_blank" className="text-blue-600 dark:text-blue-400 hover:underline text-sm font-semibold inline-flex items-center gap-1">
                                        View Repository <Icon name="external-link" size={14} />
                                    </a>
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto px-6 pb-20">
                        {error ? (
                            <div className="bg-red-50 dark:bg-red-900/10 border border-red-200 dark:border-red-800 rounded-xl p-8 text-center max-w-2xl mx-auto">
                                <Icon name="alert-circle" size={48} className="text-red-500 mx-auto mb-4" />
                                <h3 className="text-xl font-bold text-red-900 dark:text-red-400 mb-2">Connection Issue</h3>
                                <p className="text-red-700 dark:text-red-300 mb-4">Network issue ya server problem ho sakta hai. Please try again.</p>
                                <button onClick={() => window.location.reload()} className="px-6 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg font-medium">Retry</button>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-12">
                                <div className="lg:col-span-8">
                                    <SectionTitle iconName="download">SELECT YOUR VARIANT</SectionTitle>
                                    <p className="text-slate-500 dark:text-slate-400 text-sm text-center mb-8 max-w-2xl mx-auto leading-relaxed">
                                        PadhaiSetu provides a comprehensive collection of <span className="text-slate-900 dark:text-slate-200 font-semibold">Class 10 NCERT books</span> and <span className="text-slate-900 dark:text-slate-200 font-semibold">BSEB (Bihar Board)</span> textbooks.
                                    </p>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        {matchedVariants.map((variant) => (
                                            <div key={variant.id} className={`group relative bg-white dark:bg-[#0a0a0a] border ${variant.id === 'universal' ? 'border-blue-200 dark:border-blue-900/50 shadow-md ring-1 ring-blue-50 dark:ring-blue-900/10' : 'border-slate-200 dark:border-slate-800 shadow-sm'} rounded-xl p-6 flex flex-col justify-between hover:shadow-xl hover:scale-[1.02] transition-all duration-300`}>
                                                {variant.id === 'universal' && <div className="absolute top-0 right-0 bg-blue-600 text-white text-[10px] font-bold px-3 py-1 rounded-bl-lg uppercase tracking-widest animate-blink">Recommended</div>}
                                                <div>
                                                    <div className="flex justify-between items-start mb-4">
                                                        <span className={`px-3 py-1 rounded-full text-xs font-bold ${variant.id === 'universal' ? 'bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300' : 'bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400'}`}>{variant.title}</span>
                                                        {variant.id !== 'universal' && <span className="text-slate-400 dark:text-slate-500 text-sm font-medium">{variant.label}</span>}
                                                    </div>
                                                    <h3 className="text-xl font-bold mb-2 flex items-center gap-2 flex-wrap">{release?.tag_name || 'v1.0.0'}-{variant.id}{release?.prerelease && <span className="px-2 py-0.5 rounded-full border border-[#9b6400] text-[#9b6400] text-[10px] font-bold">Pre-release</span>}</h3>
                                                    <p className="text-slate-500 dark:text-slate-400 text-sm mb-6">{variant.description}</p>
                                                    <div className="space-y-2 mb-8 text-sm">
                                                        <div className="flex justify-between"><span className="text-slate-400">Size:</span><span className="font-mono">{variant.asset ? formatSize(variant.asset.size) : '---'}</span></div>
                                                        <div className="flex justify-between"><span className="text-slate-400">Arch:</span><span className="font-mono uppercase">{variant.id}</span></div>
                                                        <div className="flex justify-between border-t border-slate-50 dark:border-slate-800 pt-2"><span className="text-slate-400">Support:</span><span className="font-medium text-green-600">Android {variant.minAndroid}</span></div>
                                                    </div>
                                                </div>
                                                {variant.asset ? (
                                                    <div className="space-y-2">
                                                        <a href={variant.asset.browser_download_url} className={`w-full py-3 rounded-lg ${variant.color} text-white font-bold text-center block transition-all shadow-sm active:scale-95 hover:brightness-110`}>Download APK</a>
                                                        <button onClick={() => { generateQR(variant.asset.browser_download_url); }} className="w-full py-2 text-xs text-blue-600 dark:text-blue-400 hover:underline">📱 Get QR Code</button>
                                                    </div>
                                                ) : <div className="w-full py-3 rounded-lg bg-slate-50 dark:bg-slate-800/50 text-slate-400 font-bold text-center border border-dashed">Not in release</div>}
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="lg:col-span-4 space-y-6">
                                    <SectionTitle iconName="info">Release Info</SectionTitle>
                                    
                                    {/* Point 2: Version History Dropdown */}
                                    {allReleases.length > 1 && (
                                        <div className="bg-white dark:bg-[#0a0a0a] border border-slate-200 dark:border-slate-800 rounded-xl p-6 shadow-sm">
                                            <h4 className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3">Version History</h4>
                                            <select value={selectedVersion} onChange={(e) => handleVersionChange(e.target.value)} className="w-full p-2 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-sm">
                                                {allReleases.map(r => <option key={r.tag_name} value={r.tag_name}>{r.tag_name} {r.prerelease && '(Pre-release)'}</option>)}
                                            </select>
                                        </div>
                                    )}
                                    
                                    <div className="bg-white dark:bg-[#0a0a0a] border border-slate-200 dark:border-slate-800 rounded-xl p-6 shadow-sm">
                                        <h4 className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4">Release Notes</h4>
                                        <div className="text-slate-600 dark:text-slate-400 max-h-[300px] overflow-y-auto pr-4 custom-scrollbar whitespace-pre-wrap text-sm">{release?.body || "Official app build for NCERT education."}</div>
                                    </div>
                                    
                                    <div className="bg-white dark:bg-[#0a0a0a] border border-slate-200 dark:border-slate-800 rounded-xl p-6 shadow-sm">
                                        <h4 className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4">Integrity Checks</h4>
                                        <div className="space-y-1">
                                            <p className="text-[10px] font-bold uppercase flex items-center gap-1"><Icon name="shield-check" size={12} className="text-blue-600" /> SHA-256</p>
                                            <p className="font-mono text-[10px] text-slate-500 break-all bg-slate-50 dark:bg-slate-800 p-2 rounded uppercase">{SHA_HASH}</p>
                                            <button onClick={copyHash} className="mt-2 text-xs text-blue-600 hover:underline">{copySuccess ? '✓ Copied!' : '📋 Copy Hash'}</button>
                                        </div>
                                    </div>
                                    
                                    <div id="faq-section" className="bg-white dark:bg-[#0a0a0a] border border-slate-200 dark:border-slate-800 rounded-xl p-6 shadow-sm">
                                        <h4 className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4">FAQ</h4>
                                        <div className="space-y-4">
                                            <details className="group cursor-pointer"><summary className="text-sm font-bold flex justify-between">How to install? <Icon name="chevron-right" size={14} className="group-open:rotate-90" /></summary><p className="text-xs text-slate-500 mt-2">Download APK and enable "Unknown Sources".</p></details>
                                            <details className="group cursor-pointer"><summary className="text-sm font-bold flex justify-between">Which variant? <Icon name="chevron-right" size={14} className="group-open:rotate-90" /></summary><p className="text-xs text-slate-500 mt-2">Universal works on all. ARM64 for modern, ARM32 for older devices.</p></details>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-black pt-8 pb-12 text-center">
                        <div className="max-w-6xl mx-auto px-6 space-y-6">
                            <div className="space-y-3">
                                <p className="text-slate-600 dark:text-slate-400 text-sm font-semibold">Developed with ❤️ by PadhaiSetu</p>
                                <div className="flex items-center justify-center gap-4">
                                    <a href="https://instagram.com/suraj.kr_98" target="_blank" className="w-10 h-10 bg-slate-100 dark:bg-slate-800 flex items-center justify-center rounded-xl hover:text-pink-600 hover:scale-110 transition-all"><Icon name="instagram" size={18} /></a>
                                    <a href="https://t.me/Inspire_suraj" target="_blank" className="w-10 h-10 bg-slate-100 dark:bg-slate-800 flex items-center justify-center rounded-xl hover:text-blue-500 hover:scale-110 transition-all"><Icon name="telegram" size={18} /></a>
                                    <a href="https://github.com/xxyz42894/Update" target="_blank" className="w-10 h-10 bg-slate-100 dark:bg-slate-800 flex items-center justify-center rounded-xl hover:text-purple-600 hover:scale-110 transition-all"><Icon name="github" size={18} /></a>
                                </div>
                            </div>
                            <p className="text-slate-400 text-sm font-bold tracking-widest">@2026</p>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
