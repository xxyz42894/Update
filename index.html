        // Custom Dropdown
        const CustomDropdown = ({ options, value, onChange }) => {

        function App() {
            const [release, setRelease] = useState(null);
            const [allReleases, setAllReleases] = useState([]);
            const [selectedVersion, setSelectedVersion] = useState('');
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [copySuccess, setCopySuccess] = useState(false);
            const [displayCount, setDisplayCount] = useState(0);
            const [showQR, setShowQR] = useState(false);
            const [currentQRUrl, setCurrentQRUrl] = useState('');
            const [showWhatsNew, setShowWhatsNew] = useState(false);
            const [downloadState, setDownloadState] = useState({ show: false, progress: 0, filename: '', totalSize: 0, downloadedSize: 0, isComplete: false, variant: null });
            const [darkMode, setDarkMode] = useState(() => localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches));
            
            // Store interval ref for cleanup
            const downloadIntervalRef = useRef(null);

            useEffect(() => {
                const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
                const handler = (e) => !localStorage.getItem('theme') && setDarkMode(e.matches);
                mediaQuery.addEventListener('change', handler);
                return () => mediaQuery.removeEventListener('change', handler);
            }, []);

            useEffect(() => {
                if (darkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', darkMode ? 'dark' : 'light');
            }, [darkMode]);

            useEffect(() => {
                async function fetchData() {
                    const startTime = Date.now();
                    try {
                        const listRes = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/releases`);
                        const list = await listRes.json();
                        setAllReleases(list);
                        const relRes = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/releases/latest`);
                        if (!relRes.ok) { setRelease(list[0]); if (list[0]) setSelectedVersion(list[0].tag_name); }
                        else { const data = await relRes.json(); setRelease(data); setSelectedVersion(data.tag_name); }
                        const lastSeen = localStorage.getItem('lastSeenVersion');
                        if (lastSeen && list[0] && lastSeen !== list[0].tag_name) showToast(`New version ${list[0].tag_name} available!`, 'info');
                        if (list[0]) localStorage.setItem('lastSeenVersion', list[0].tag_name);
                    } catch (err) {
                        setError(err.message);
                        setRelease({ tag_name: "v1.0.0", assets: [], published_at: new Date().toISOString(), body: "Official app build." });
                    } finally {
                        const elapsed = Date.now() - startTime;
                        setTimeout(() => setLoading(false), Math.max(0, MIN_LOADING_TIME - elapsed));
                    }
                }
                fetchData();
                if (!localStorage.getItem('seenWhatsNew')) { setShowWhatsNew(true); localStorage.setItem('seenWhatsNew', 'true'); }
            }, []);

            useEffect(() => {
                if (!release || !release.assets) return;
                const total = release.assets.reduce((acc, curr) => acc + (curr.download_count || 0), 0);
                if (total === 0) { setDisplayCount(0); return; }
                let start = 0; const duration = 1000; const stepTime = 20; const steps = duration / stepTime; const increment = total / steps; let currentStep = 0;
                const timer = setInterval(() => { currentStep++; if (currentStep >= steps) { setDisplayCount(total); clearInterval(timer); } else setDisplayCount(Math.floor(increment * currentStep)); }, stepTime);
                return () => clearInterval(timer);
            }, [release?.tag_name]);

            const handleVersionChange = (versionTag) => {
                const selected = allReleases.find(r => r.tag_name === versionTag);
                if (selected) { setRelease(selected); setSelectedVersion(versionTag); }
            };

            const formatSize = (bytes) => bytes ? `${(bytes / (1024 * 1024)).toFixed(1)} MB` : '---';

            const matchedVariants = release ? VARIANTS.map(v => ({ ...v, asset: release.assets?.find(asset => v.matchPatterns.some(pattern => asset.name.toLowerCase().includes(pattern.toLowerCase()))) })) : VARIANTS;

            const copyHash = () => { navigator.clipboard?.writeText(SHA_HASH); setCopySuccess(true); setTimeout(() => setCopySuccess(false), 2000); showToast('Hash copied!'); };
            const shareApp = async () => { if (navigator.share) await navigator.share({ title: 'PadhaiSetu APK', text: 'Download Class 10 NCERT & BSEB books', url: window.location.href }); else { navigator.clipboard?.writeText(window.location.href); showToast('Link copied!'); } };
            const generateQR = (url) => { setCurrentQRUrl(url); setShowQR(true); };

            // ========== FIXED DOWNLOAD FUNCTION ==========
            const handleDownload = (asset, variant) => {
                const version = release?.tag_name || 'v1.0.0';
                const filename = `${APP_NAME}-${version}-${variant.id}.apk`;
                const totalSize = asset.size;
                
                // Clear any existing interval
                if (downloadIntervalRef.current) {
                    clearInterval(downloadIntervalRef.current);
                }
                
                setDownloadState({ show: true, progress: 0, filename, totalSize, downloadedSize: 0, isComplete: false, variant });
                
                // DIRECT DOWNLOAD - No CORS issue
                const link = document.createElement('a');
                link.href = asset.browser_download_url;
                link.download = filename;
                link.target = '_blank';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                // Simulated progress for UX
                let progress = 0;
                downloadIntervalRef.current = setInterval(() => {
                    progress += 4;
                    if (progress >= 100) {
                        clearInterval(downloadIntervalRef.current);
                        downloadIntervalRef.current = null;
                        setDownloadState(prev => ({ 
                            ...prev, 
                            isComplete: true, 
                            progress: 100,
                            downloadedSize: totalSize 
                        }));
                        showToast(`✅ ${filename} downloaded!`, 'success');
                    } else {
                        setDownloadState(prev => ({ 
                            ...prev, 
                            progress,
                            downloadedSize: Math.floor((progress / 100) * totalSize)
                        }));
                    }
                }, 100);
            };

            const closeDownloadPanel = () => {
                if (downloadIntervalRef.current) {
                    clearInterval(downloadIntervalRef.current);
                    downloadIntervalRef.current = null;
                }
                setDownloadState({ show: false, progress: 0, filename: '', totalSize: 0, downloadedSize: 0, isComplete: false, variant: null });
            };
            
            // Cleanup on unmount
            useEffect(() => {
                return () => {
                    if (downloadIntervalRef.current) {
                        clearInterval(downloadIntervalRef.current);
                    }
                };
            }, []);

            const dropdownOptions = allReleases.map(r => ({ value: r.tag_name, label: `${r.tag_name} ${r.prerelease ? '• Pre-release' : ''}`, tag_name: r.tag_name, prerelease: r.prerelease, date: new Date(r.published_at).toLocaleDateString() }));
            const selectedReleaseInfo = allReleases.find(r => r.tag_name === selectedVersion);
            const totalDownloads = displayCount || release?.assets?.reduce((acc, curr) => acc + (curr.download_count || 0), 0) || 0;

            if (loading) {
                return (
                    <div className="min-h-screen bg-slate-50 dark:bg-black flex items-center justify-center">
                        <div className="text-center">
                            <div className="relative">
                                <div className="animate-spin w-14 h-14 border-4 border-slate-200 dark:border-slate-800 border-t-blue-600 rounded-full mx-auto"></div>
                                <div className="absolute inset-0 flex items-center justify-center"><Icon name="download" size={20} className="text-blue-600 animate-pulse" /></div>
                            </div>
                            <p className="mt-4 text-sm text-slate-500 dark:text-slate-400 font-medium">Loading PadhaiSetu...</p>
                            <p className="text-xs text-slate-400 mt-1">Fetching latest version</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-50 dark:bg-black text-slate-900 dark:text-white transition-colors duration-700 overflow-x-hidden">
                    {/* What's New Modal */}
                    {showWhatsNew && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay" onClick={() => setShowWhatsNew(false)}>
                            <div className="bg-white dark:bg-slate-900 rounded-2xl p-6 max-w-md w-full animate-slideIn shadow-2xl" onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-4">
                                    <div className="flex items-center gap-2"><Icon name="sparkles" size={20} className="text-blue-600" /><h3 className="text-xl font-bold">What's New</h3></div>
                                    <button onClick={() => setShowWhatsNew(false)} className="p-1 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full"><Icon name="x" size={18} /></button>
                                </div>
                                <ul className="space-y-3 text-sm text-slate-600 dark:text-slate-400">
                                    <li className="flex gap-3"><span className="text-blue-600">✨</span><span>Beautiful version history with dropdown</span></li>
                                    <li className="flex gap-3"><span className="text-blue-600">📱</span><span>Bottom slide-up download panel</span></li>
                                    <li className="flex gap-3"><span className="text-blue-600">📊</span><span>Live MB progress tracking</span></li>
                                    <li className="flex gap-3"><span className="text-blue-600">🌙</span><span>Dark mode with system sync</span></li>
                                </ul>
                                <button onClick={() => setShowWhatsNew(false)} className="mt-6 w-full py-3 bg-blue-600 text-white rounded-xl font-medium hover:bg-blue-700">Got it!</button>
                            </div>
                        </div>
                    )}

                    {/* Bottom Download Panel */}
                    {downloadState.show && (
                        <DownloadPanel {...downloadState} onClose={closeDownloadPanel} />
                    )}

                    {/* QR Modal */}
                    {showQR && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay" onClick={() => setShowQR(false)}>
                            <div className="bg-white dark:bg-slate-900 rounded-2xl p-6 text-center" onClick={e => e.stopPropagation()}>
                                <h3 className="font-bold mb-4">Scan to Download</h3>
                                <img src={`https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(currentQRUrl)}`} alt="QR" className="mx-auto rounded-lg" />
                                <button onClick={() => setShowQR(false)} className="mt-4 px-4 py-2 bg-slate-200 dark:bg-slate-800 rounded-lg">Close</button>
                            </div>
                        </div>
                    )}

                    {/* Navigation */}
                    <nav className="border-b border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-black/80 backdrop-blur-md sticky top-0 z-40">
                        <div className="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-3"><div className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white shadow-lg"><Icon name="smartphone" size={18} className="text-white" /></div><span className="font-bold text-lg tracking-tight">PadhaiSetu APK</span></div>
                            <div className="flex items-center gap-2 sm:gap-4">
                                <button onClick={shareApp} className="p-2 rounded-xl bg-slate-100 dark:bg-slate-900 text-slate-600 dark:text-slate-400 hover:text-blue-600"><Icon name="share" size={18} /></button>
                                <button onClick={() => setDarkMode(!darkMode)} className="p-2 rounded-xl bg-slate-100 dark:bg-slate-900 text-slate-600 dark:text-slate-400 hover:text-blue-600">{darkMode ? <Icon name="sun" size={18} /> : <Icon name="moon" size={18} />}</button>
                            </div>
                        </div>
                    </nav>

                    {/* Hero */}
                    <header className="relative pt-12 pb-8 overflow-hidden">
                        <div className="absolute top-0 left-1/2 -translate-x-1/2 w-full h-full -z-10 pointer-events-none opacity-20 dark:opacity-10"><div className="absolute top-[-10%] left-[-10%] w-[40%] h-[60%] bg-blue-400 blur-[120px] rounded-full" /><div className="absolute bottom-[-10%] right-[-10%] w-[40%] h-[60%] bg-purple-400 blur-[120px] rounded-full" /></div>
                        <div className="max-w-6xl mx-auto px-6 text-center">
                            <div className="flex flex-col items-center gap-4">
                                <div className="flex items-center gap-2"><Badge>Latest Release</Badge>{release?.prerelease && <span className="px-3 py-1 rounded-full border-2 border-[#9b6400] text-[#9b6400] text-[11px] font-bold">Pre-release</span>}</div>
                                <h1 className="text-3xl md:text-4xl font-bold tracking-tight">PadhaiSetu Mobile App</h1>
                                <p className="text-slate-500 dark:text-slate-400 font-medium">{release?.tag_name || 'v1.0.0'} • {totalDownloads.toLocaleString()} Total Downloads</p>
                                <button onClick={() => generateQR(window.location.href)} className="px-4 py-2 bg-slate-100 dark:bg-slate-800 rounded-lg text-sm font-medium hover:bg-slate-200">📱 Get QR Code</button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto px-6 pb-20">
                        {error ? (
                            <div className="bg-red-50 dark:bg-red-900/10 border border-red-200 rounded-xl p-8 text-center max-w-2xl mx-auto">
                                <Icon name="alert-circle" size={48} className="text-red-500 mx-auto mb-4" />
                                <h3 className="text-xl font-bold mb-2">Connection Issue</h3>
                                <p className="mb-4">Network issue. Try again.</p>
                                <button onClick={() => window.location.reload()} className="px-6 py-2 bg-red-600 text-white rounded-lg">Retry</button>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                                <div className="lg:col-span-8">
                                    <SectionTitle iconName="download">SELECT YOUR VARIANT</SectionTitle>
                                    <p className="text-slate-500 text-sm text-center mb-8">PadhaiSetu provides <span className="font-semibold">Class 10 NCERT</span> and <span className="font-semibold">BSEB textbooks</span>.</p>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        {matchedVariants.map((variant) => (
                                            <div key={variant.id} className={`group relative bg-white dark:bg-[#0a0a0a] border ${variant.id === 'universal' ? 'border-blue-200 dark:border-blue-900/50' : 'border-slate-200 dark:border-slate-800'} rounded-xl p-6 flex flex-col justify-between hover:shadow-xl hover:scale-[1.02] transition-all`}>
                                                {variant.id === 'universal' && <div className="absolute top-0 right-0 bg-blue-600 text-white text-[10px] font-bold px-3 py-1 rounded-bl-lg uppercase animate-blink">Recommended</div>}
                                                <div>
                                                    <div className="flex justify-between items-start mb-4">
                                                        <span className={`px-3 py-1 rounded-full text-xs font-bold ${variant.id === 'universal' ? 'bg-blue-50 dark:bg-blue-900/30 text-blue-700' : 'bg-slate-100 dark:bg-slate-800'}`}>{variant.title}</span>
                                                        {variant.id !== 'universal' && <span className="text-slate-400 text-sm">{variant.label}</span>}
                                                    </div>
                                                    <h3 className="text-xl font-bold mb-2">{release?.tag_name}-{variant.id}{release?.prerelease && <span className="ml-2 px-2 py-0.5 rounded-full border border-[#9b6400] text-[#9b6400] text-[10px]">Pre-release</span>}</h3>
                                                    <p className="text-slate-500 text-sm mb-6">{variant.description}</p>
                                                    <div className="space-y-2 mb-8 text-sm">
                                                        <div className="flex justify-between"><span className="text-slate-400">Size:</span><span className="font-mono">{variant.asset ? formatSize(variant.asset.size) : '---'}</span></div>
                                                        <div className="flex justify-between"><span className="text-slate-400">Arch:</span><span className="font-mono uppercase">{variant.id}</span></div>
                                                        <div className="flex justify-between border-t pt-2"><span className="text-slate-400">Support:</span><span className="text-green-600">Android {variant.minAndroid}</span></div>
                                                    </div>
                                                </div>
                                                {variant.asset ? (
                                                    <div className="space-y-2">
                                                        <button onClick={() => handleDownload(variant.asset, variant)} className={`w-full py-3 rounded-lg ${variant.color} text-white font-bold active:scale-95 hover:brightness-110`}>Download APK</button>
                                                        <button onClick={() => generateQR(variant.asset.browser_download_url)} className="w-full py-2 text-xs text-blue-600 hover:underline">📱 Get QR Code</button>
                                                    </div>
                                                ) : <div className="w-full py-3 rounded-lg bg-slate-50 dark:bg-slate-800/50 text-slate-400 text-center border">Not in release</div>}
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="lg:col-span-4 space-y-5">
                                    <SectionTitle iconName="info">Release Info</SectionTitle>
                                    
                                    {allReleases.length > 0 && (
                                        <div className="bg-white dark:bg-[#0a0a0a] border border-slate-200 dark:border-slate-800 rounded-xl overflow-hidden">
                                            <div className="p-5 border-b border-slate-100 dark:border-slate-800"><div className="flex items-center gap-2"><Icon name="tag" size={16} className="text-blue-600" /><h4 className="text-xs font-bold text-slate-500 uppercase">Version History</h4></div></div>
                                            <div className="p-5">
                                                <CustomDropdown options={dropdownOptions} value={selectedVersion} onChange={handleVersionChange} />
                                                
                                                {selectedReleaseInfo && (
                                                    <div className="mt-5 text-center">
                                                        <p className="text-2xl font-bold text-slate-800 dark:text-slate-100">{selectedReleaseInfo.tag_name}</p>
                                                        <p className="text-sm text-slate-500 dark:text-slate-400 mt-0.5">{new Date(selectedReleaseInfo.published_at).toLocaleDateString()}</p>
                                                        {selectedReleaseInfo.prerelease && <span className="inline-block mt-2 px-3 py-0.5 bg-amber-100 dark:bg-amber-900/30 text-amber-700 dark:text-amber-400 text-[10px] font-bold rounded-full uppercase">Pre-release</span>}
                                                    </div>
                                                )}
                                                
                                                <div className="mt-5 pt-4 border-t border-slate-100 dark:border-slate-800 flex items-center justify-between">
                                                    <span className="text-xs text-slate-500">{allReleases.length} versions available</span>
                                                    <span className="text-xs text-blue-600 font-medium">Currently: {release?.tag_name}</span>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                    
                                    <div className="bg-white dark:bg-[#0a0a0a] border border-slate-200 dark:border-slate-800 rounded-xl p-5">
                                        <h4 className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4">Release Notes</h4>
                                        <div className="text-slate-600 dark:text-slate-400 max-h-[180px] overflow-y-auto pr-3 custom-scrollbar text-sm">{release?.body || "Official app build."}</div>
                                    </div>
                                    
                                    <div className="bg-white dark:bg-[#0a0a0a] border border-slate-200 dark:border-slate-800 rounded-xl p-5">
                                        <h4 className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4">Integrity Checks</h4>
                                        <div className="space-y-2">
                                            <p className="text-[10px] font-bold uppercase flex items-center gap-1"><Icon name="shield-check" size={12} className="text-blue-600" /> SHA-256</p>
                                            <p className="font-mono text-[10px] text-slate-500 break-all bg-slate-50 dark:bg-slate-800 p-2 rounded uppercase">{SHA_HASH.substring(0, 40)}...</p>
                                            <button onClick={copyHash} className="mt-2 text-xs text-blue-600 hover:underline">{copySuccess ? '✓ Copied!' : '📋 Copy Hash'}</button>
                                        </div>
                                    </div>
                                    
                                    <div className="bg-white dark:bg-[#0a0a0a] border border-slate-200 dark:border-slate-800 rounded-xl p-5">
                                        <h4 className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4">FAQ</h4>
                                        <div className="space-y-3">
                                            <details className="group"><summary className="text-sm font-medium flex justify-between">How to install? <Icon name="chevron-right" size={14} className="group-open:rotate-90" /></summary><p className="text-xs text-slate-500 mt-2">Download APK, open file manager, tap to install.</p></details>
                                            <details className="group"><summary className="text-sm font-medium flex justify-between">Which variant? <Icon name="chevron-right" size={14} className="group-open:rotate-90" /></summary><p className="text-xs text-slate-500 mt-2">Universal for all. ARM64 for new, ARM32 for old.</p></details>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-black pt-8 pb-12 text-center">
                        <div className="max-w-6xl mx-auto px-6 space-y-6">
                            <p className="text-slate-600 dark:text-slate-400 text-sm">Developed with ❤️ by PadhaiSetu</p>
                            <div className="flex items-center justify-center gap-4">
                                <a href="https://instagram.com/suraj.kr_98" target="_blank" className="w-10 h-10 bg-slate-100 dark:bg-slate-800 rounded-xl flex items-center justify-center hover:text-pink-600 hover:scale-110"><Icon name="instagram" size={18} /></a>
                                <a href="https://t.me/Inspire_suraj" target="_blank" className="w-10 h-10 bg-slate-100 dark:bg-slate-800 rounded-xl flex items-center justify-center hover:text-blue-500 hover:scale-110"><Icon name="telegram" size={18} /></a>
                                <a href="https://github.com/xxyz42894/Update" target="_blank" className="w-10 h-10 bg-slate-100 dark:bg-slate-800 rounded-xl flex items-center justify-center hover:text-purple-600 hover:scale-110"><Icon name="github" size={18} /></a>
                            </div>
                            <p className="text-slate-400 text-sm font-bold tracking-widest">@2026</p>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
